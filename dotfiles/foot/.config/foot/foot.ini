# foot - lightweight wayland terminal
# Configuration for use with dwl-guile and Emacs workflow

[main]
# Font configuration
font = Monospace:size=12
dpi-aware = yes

# Scrollback buffer
scrollback-lines = 1000
scrollback-indicator = both

# Bell notification
bell = visual

# Search support
search-launch = emacsclient -c -F '((title . "foot-search"))'

[mouse]
hide-when-typing = yes

[colors]
# Solarized Dark color scheme
foreground = d8d8d8
background = 1e1e1e

# Black
palette = 2e3440
palette = bf616a
palette = a3be8c
palette = ebcb8b
palette =81a1c1
palette = b48ead
palette = 88c0d0
palette = eceff4

# Bright colors
palette = 4c566a
palette = bf616a
palette = a3be8c
palette = ebcb8b
palette = 81a1c1
palette = b48ead
palette =8fbcbb
palette = eceff4

# Cursor styling
cursor.style = block
cursor.color = 81a1c1
cursor.blink = yes

# Selection colors
selection.foreground = 2e3440
selection.background = 81a1c1

[tweak]
# Font features
force-underline-thickness = 0
force-box-drawing-chars = no

[key-bindings]
# Standard navigation
clipboard-copy = ctrl+shift+c
clipboard-paste = ctrl+shift+v
primary-paste = shift+insert

# Font size adjustment
font-increase = ctrl+plus
font-decrease = ctrl+minus
font-reset = ctrl+0

# Search/URL opening
search-start = ctrl+shift+f

# New window (if terminal multiplexer desired)
# new-window = super+t

# Session management
quit = ctrl+shift+q

[url]
# Configure URL detection and opening
launch = emacsclient -c '{url}'
osc8-underline = url-mode

[wayland]
# Use wayland-specific features when available
